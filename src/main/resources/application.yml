spring:
  application:
    name: kg-platform
  servlet:
    multipart:
      enabled: true
      max-file-size: 2MB
      max-request-size: 2MB
  datasource:
    url: jdbc:mysql://localhost:3306/kg_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&useSSL=false
    username: root
    password: zhan20021204
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
  sql:
    init:
      mode: never

server:
  port: 8090

file:
  upload-path: uploads

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: kg-platform
  public-host: http://localhost:9000

neo4j:
  uri: bolt://localhost:7687
  username: neo4j
  password: zhan20021204

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.kgplatform.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: KgPlatformSecretKey2026DoNotShareWithAnyone12345678901234567890
  expiration: 86400000
  header: Authorization
  token-prefix: Bearer

knife4j:
  enable: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    com.example.kgplatform: debug

# Ollama 本地 LLM 配置（免费）
ollama:
  enabled: ${OLLAMA_ENABLED:true}
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:deepseek-r1:1.5b}

# DashScope 通义千问 LLM 配置
dashscope:
  api-key: ${DASHSCOPE_API_KEY:sk-8ea0cac2afb94261bf2a70c3bf786a0b}
  model: qwen-plus
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  max-retries: 3
  connect-timeout: 0
  socket-timeout: 0

